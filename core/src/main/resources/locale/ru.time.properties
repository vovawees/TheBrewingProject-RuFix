#  +-----------------------------------------------------------------------------------+
#  | Формат отображения временных интервалов.                                         |
#  +-----------------------------------------------------------------------------------+
#
#  Используемые плейсхолдеры: <ticks>, <seconds>, <minutes>, <hours>, <days>, <years>
#  Тотальные значения: <seconds-total>, <minutes-total>, <hours-total>, <days-total>, <years-total>
#
#  Условные блоки:
#    <if-unit>...</if-unit>    — показывается если единица НЕ равна нулю
#    <if-!unit>...</if-!unit>  — показывается если единица равна нулю
#
#  Склонение (русская система):
#    {текст}<<1>>      — последняя цифра = 1 (1, 21, 31...)
#    {текст}<<2-4>>    — последняя цифра 2–4 (2, 3, 4, 22, 23...)
#    [текст]           — всё остальное (0, 5–20, 25–30...)
#    {текст}<<<11-19>>> — последние две цифры 11–19 (исключения рус. языка)
#
#  Порядок важен: <<<>>> имеет наивысший приоритет, затем <<>>, затем []{}
#
#  Примеры (RU):
#    1 год, 21 год | 2 года, 34 года | 5 лет, 11 лет, 20 лет
#    1 минута      | 2 минуты        | 5 минут, 11 минут
#    1 секунда     | 2 секунды       | 5 секунд, 12 секунд

aging-years=<years-total> {лет}<<<11-19>>> {год}<<1>> {года}<<2-4>> [лет]

clock-mechanic=<if-days-total><days-total> {день}<<1>> {дня}<<2-4>> [дней] {дней}<<<11-19>>>, <if-!hours><hours> {час}<<1>> {часа}<<2-4>> [часов] {часов}<<<11-19>>>, </if-!hours></if-days-total><if-hours><hours> {час}<<1>> {часа}<<2-4>> [часов] {часов}<<<11-19>>>, </if-hours><minutes> {минута}<<1>> {минуты}<<2-4>> [минут] {минут}<<<11-19>>> и <seconds> {секунда}<<1>> {секунды}<<2-4>> [секунд] {секунд}<<<11-19>>>

cooking-time=<if-hours-total><hours> {час}<<1>> {часа}<<2-4>> [часов] {часов}<<<11-19>>>, </if-hours-total><minutes> {минута}<<1>> {минуты}<<2-4>> [минут] {минут}<<<11-19>>> и <seconds> {секунда}<<1>> {секунды}<<2-4>> [секунд] {секунд}<<<11-19>>>

mixing-time=<if-hours-total><hours> {час}<<1>> {часа}<<2-4>> [часов] {часов}<<<11-19>>>, </if-hours-total><minutes> {минута}<<1>> {минуты}<<2-4>> [минут] {минут}<<<11-19>>> и <seconds> {секунда}<<1>> {секунды}<<2-4>> [секунд] {секунд}<<<11-19>>>
